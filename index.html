<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Puzle Japonés</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .grid { display: inline-grid; grid-template-columns: repeat(5, 40px); gap: 2px; margin-top: 20px; }
        .cell { width: 40px; height: 40px; border: 1px solid #000; cursor: pointer; }
        .filled { background-color: #000; }
    </style>
</head>
<body>
    <h1>Nonograma</h1>
    <div class="grid" id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        for(let i=0; i<25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => cell.classList.toggle('filled');
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
