<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nonograma</title>
    <style>
        body { font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .grid { display: inline-grid; grid-template-columns: repeat(5, 50px); gap: 2px; margin: 20px; }
        .cell { width: 50px; height: 50px; border: 1px solid #000; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
        .filled { background-color: #000; }
        .xmark::after { content: '×'; color: #ff0000; }
        .controls { margin-top: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Nonograma 5x5: Prueba de "X"</h1>
    <div class="controls">
        <button id="modeBtn">Modo: Pintar (Negro)</button>
    </div>
    <div class="grid" id="grid"></div>
    <script>
        let mode = 'filled';
        const grid = document.getElementById('grid');
        const btn = document.getElementById('modeBtn');

        btn.onclick = () => {
            mode = (mode === 'filled') ? 'xmark' : 'filled';
            btn.innerText = (mode === 'filled') ? 'Modo: Pintar (Negro)' : 'Modo: Marcar (X)';
        };

        for(let i=0; i<25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => {
                cell.className = 'cell ' + mode;
            };
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
