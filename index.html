<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nonograma con Pistas</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .game-container { display: grid; grid-template-columns: 50px 250px; grid-template-rows: 50px 250px; gap: 5px; }
        .row-hints { display: flex; flex-direction: column; justify-content: space-around; align-items: flex-end; background: #eee; }
        .col-hints { display: flex; justify-content: space-around; align-items: flex-end; background: #eee; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(5, 50px); grid-template-rows: repeat(5, 50px); border: 2px solid #000; }
        .cell { width: 50px; height: 50px; border: 1px solid #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .filled { background-color: #000; }
        .xmark::after { content: '×'; color: red; font-size: 30px; }
    </style>
</head>
<body>
    <h1>Nonograma (Pista: Una X)</h1>
    <button id="modeBtn">Modo: Pintar (Negro)</button>
    <div class="game-container">
        <div class="col-hints"><span>1 1</span><span>1</span><span>1</span><span>1</span><span>1 1</span></div>
        <div class="row-hints"><span>1 1</span><span> 1 </span><span> 3 </span><span> 1 </span><span>1 1</span></div>
        <div class="grid" id="grid"></div>
    </div>
    <script>
        let mode = 'filled';
        const grid = document.getElementById('grid');
        const btn = document.getElementById('modeBtn');

        btn.onclick = () => {
            mode = (mode === 'filled') ? 'xmark' : 'filled';
            btn.innerText = (mode === 'filled') ? 'Modo: Pintar (Negro)' : 'Modo: Marcar (X)';
        };

        for(let i=0; i<25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => cell.className = 'cell ' + mode;
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
