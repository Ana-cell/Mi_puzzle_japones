    .tab:hover { background: #3d3a70; color: #fff; }

    .puzzle-btn.active { background: #6c5ce7; border-color: #a29bfe; color: #fff; }
    .game-wrapper { display: grid; }
    .col-hint-cell { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 1px; padding-bottom: 3px; }
    .col-hint-cell span { font-size: 0.7rem; font-weight: bold; color: #a29bfe; line-height: 1.3; }
    .row-hint-cell { display: flex; align-items: center; justify-content: flex-end; gap: 3px; padding-right: 6px; }
    .row-hint-cell span { font-size: 0.7rem; font-weight: bold; color: #a29bfe; }
    .cell { border: 1px solid #3d3a70; cursor: pointer; transition: background 0.1s; user-select: none; display: flex; align-items: center; justify-content: center; }
    .cell:hover:not(.filled):not(.xmark) { background: #2d2b55; }
    .cell.filled { background: #6c5ce7; border-color: #4a4580; }
    .cell.xmark::after { content: '✕'; color: #e17055; font-size: 0.8rem; }
    .cell.correct { background: #00b894 !important; }
    .cell.wrong { background: #d63031 !important; }
    .cell.br5 { border-right: 2px solid #6c5ce7; }
    .cell.bb5 { border-bottom: 2px solid #6c5ce7; }
    .controls { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; justify-content: center; }
    .btn { padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: bold; transition: all 0.2s; }
    #modeBtn { background: #2d3436; color: #a29bfe; border: 1px solid #6c5ce7; }
    #modeBtn.xmode { color: #e17055; border-color: #e17055; }
    #checkBtn { background: #6c5ce7; color: #fff; }
    #checkBtn:hover { background: #5a4fcf; }
    #resetBtn { background: #2d2b55; color: #ccc; border: 1px solid #4a4580; }
    #message { margin-top: 14px; font-size: 0.95rem; min-height: 22px; }
    #message.win { color: #00b894; }
    #message.fail { color: #e17055; }
    .diff-badge { display: inline-block; font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; margin-left: 8px; vertical-align: middle; font-weight: bold; letter-spacing: 1px; }
    .badge-facil { background: #00b894; color: #fff; }
    .badge-medio { background: #6c5ce7; color: #fff; }
