<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nonograma</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .grid { display: inline-grid; grid-template-columns: repeat(5, 40px); gap: 2px; }
        .cell { width: 40px; height: 40px; border: 1px solid #000; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .filled { background-color: #000; }
        .xmark::after { content: '×'; font-size: 30px; }
        .controls { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Nonograma 5x5</h1>
    <div class="controls">
        <button id="modeBtn">Modo: Pintar Negro</button>
    </div>
    <div class="grid" id="grid"></div>
    <script>
        let mode = 'filled'; // 'filled' o 'xmark'
        const grid = document.getElementById('grid');
        const btn = document.getElementById('modeBtn');

        btn.onclick = () => {
            mode = (mode === 'filled') ? 'xmark' : 'filled';
            btn.innerText = (mode === 'filled') ? 'Modo: Pintar Negro' : 'Modo: Marcar X';
        };

        for(let i=0; i<25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => {
                cell.className = 'cell ' + mode;
            };
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
